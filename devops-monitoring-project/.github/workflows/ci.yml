name: DevOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: devops-monitoring-project

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t devops-monitoring-app .